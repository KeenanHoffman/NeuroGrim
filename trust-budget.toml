# ----------------------------------------------------------------------------
# Shell-out commands — extracted from a static scan of `scripts/*.sh`. Per
# Y-2, v1 is static-only; runtime-observed Bash invocations are deferred to
# B-23. All shell-outs below are POSIX builtins or industry-standard tooling
# documented in TOOL-TRUST-NOTES.md §"Current trust chain".
# ----------------------------------------------------------------------------

[[declared_shell_outs]]
command_name = "cargo-audit"
script_paths = ["scripts/prepublish-check.sh"]
notes = "RustSec-maintained advisory cross-check; OPTIONAL secondary signal in prepublish (TOOL-TRUST-NOTES.md line 33)."

[[declared_shell_outs]]
command_name = "cat"
notes = "POSIX builtin; file output. Operator-trusted."

[[declared_shell_outs]]
command_name = "curl"
notes = "Git-for-Windows mingw64 (Windows) or system; HTTPS via Schannel/OpenSSL. Operator-trusted host-level (TOOL-TRUST-NOTES.md Q1)."

[[declared_shell_outs]]
command_name = "docker"
script_paths = ["scripts/verify-compose.sh", "scripts/verify-external-brain.sh"]
notes = "Container CLI for compose + external-brain integration tests; operator-trusted host-level."

[[declared_shell_outs]]
command_name = "grep"
notes = "POSIX builtin; pattern matching."

[[declared_shell_outs]]
command_name = "head"
notes = "POSIX builtin; line-count limiter."

[[declared_shell_outs]]
command_name = "jq"
notes = "stedolan/jq; JSON tooling. Optional on operator machine; helper only — Python stdlib substitutes (TOOL-TRUST-NOTES.md §2026-04-24)."

[[declared_shell_outs]]
command_name = "mkdir"
notes = "POSIX builtin; directory creation."

[[declared_shell_outs]]
command_name = "mv"
notes = "POSIX builtin; file move/rename."

[[declared_shell_outs]]
command_name = "rm"
notes = "POSIX builtin; file removal."

# ----------------------------------------------------------------------------
# External services — FQDNs the workspace's source code references. Per Y-3,
# operator declares the EXPECTED set; sensor cross-references actual call
# sites. Real services are pinned with `trust_posture` from the closed-set
# enum {api_only, official_registry, operator_audited, vendor_attested}.
# Doc-string examples (alpha.example, peer.example, vault.example.com, etc.)
# are seeded as advisory-only — the scanner picks them up from docs/tests.
# ----------------------------------------------------------------------------

[[declared_external_services]]
fqdn = "api.osv.dev"
purpose = "OSV vulnerability database batch query endpoint (E-SC-2 supply-chain-sca primary advisory source)."
trust_posture = "api_only"
notes = "Google-operated; HTTPS; public data; no credentials. TOOL-TRUST-NOTES.md §E-SC-2."

[[declared_external_services]]
fqdn = "osv.dev"
purpose = "OSV.dev parent FQDN; used in hat-contract supply-chain-auditor.network_targets.allowed."
trust_posture = "api_only"
notes = "Same posture as api.osv.dev. Declared distinctly so the per-hat composition check (§16.8) finds the allow-list match."

[[declared_external_services]]
fqdn = "crates.io"
purpose = "crates.io public JSON metadata API for Layer 2 vigilance (E-SC-5 publish_history + maintainer_delta)."
trust_posture = "official_registry"
notes = "HTTPS-only; rate-limited 250ms inter-request; 7-day file cache. TOOL-TRUST-NOTES.md §E-SC-5."

[[declared_external_services]]
fqdn = "pypi.org"
purpose = "PyPI public JSON metadata API for Layer 2 vigilance (publish_history + sigstore + sdist URL)."
trust_posture = "official_registry"
notes = "HTTPS-only; same posture as crates.io. TOOL-TRUST-NOTES.md §E-SC-5."

[[declared_external_services]]
fqdn = "registry.npmjs.org"
purpose = "npm registry CouchDB-style API for Layer 2 vigilance (publish_history + maintainers + attestation)."
trust_posture = "official_registry"
notes = "HTTPS-only; same posture as crates.io / pypi.org. TOOL-TRUST-NOTES.md §E-SC-5."

[[declared_external_services]]
fqdn = "registry.yarnpkg.com"
purpose = "Yarn registry mirror; referenced from yarn.lock fixtures parsed by yarn-lock-parser (E-SC-4)."
trust_posture = "official_registry"
notes = "Mirror of npm registry; appears in fixture lockfiles, not invoked at runtime by the sensor."

[[declared_external_services]]
fqdn = "github.com"
purpose = "Repository URLs in package metadata; used by Layer 2 vigilance for repo-presence cross-checks."
trust_posture = "api_only"
notes = "Read-only metadata fetch only; no clone or write operations from the sensor."

[[declared_external_services]]
fqdn = "rustsec.org"
purpose = "RustSec advisory metadata URLs in CMDB outputs (link-back to advisory pages)."
trust_posture = "api_only"
notes = "Display-only; the actual advisory data comes from the vendored rustsec/advisory-db submodule."

[[declared_external_services]]
fqdn = "hugovk.github.io"
purpose = "Source for the typosquat refresh-list (scripts/refresh-typosquat-list.sh fetches popular-package data quarterly)."
trust_posture = "api_only"
notes = "Public read-only; popularity signal, not security data; stale list = false negatives, never false positives. TOOL-TRUST-NOTES.md §E-SC-5."

