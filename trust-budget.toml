schema_version = "1"

notes = """
NeuroGrim trust-budget v1 (E-B2-4 first-customer baseline, 2026-04-27).

NeuroGrim is the canonical reference implementation of the LSP Brains spec:
a Rust workspace at `neurogrim/` (6 member crates + ~36 direct workspace
deps) plus operator scripts under `scripts/`. The trust surface is dominated
by the cargo ecosystem; no Python or Node lockfile lives at the Brain root.

Trust-chain provenance is captured prose-side in `D:/Brains/audit/TOOL-TRUST-NOTES.md`
(the running trust narrative). This TOML is the structured machine-checkable
extract of that prose, per spec §16.8. Per Q3+Q4: descriptive-only at v1,
advisory weight 0.0 — drift findings inform; they do not gate.

Seeded entries (`seeded = true`) cover known operator-acknowledged noise:
hand-rolled FQDN strings that the static service scanner picks up from
doc strings, integration-test fixtures, or `.example` / `.internal` /
`.localhost` examples. They are advisory-only and do NOT represent live
network surface.
"""

# ----------------------------------------------------------------------------
# Direct cargo dependencies — extracted from `[workspace.dependencies]` and
# per-crate manifests under `neurogrim/crates/*/Cargo.toml`. Per Q1, scope
# is direct only; the 369-package transitive closure is deferred to v2 per
# BACKLOG B-23. Trust-chain entries for SCA-adjacent crates (cargo-lock,
# toml, semver, sha2, reqwest, tar, flate2, yarn-lock-parser) are
# documented in TOOL-TRUST-NOTES.md §E-SC-2 / §E-SC-4 / §E-SC-5.
# ----------------------------------------------------------------------------

