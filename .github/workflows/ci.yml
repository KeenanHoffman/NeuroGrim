name: CI

# Spec §3.8 "Testing Discipline" — every push and PR runs the full suite
# so drift surfaces at commit time rather than at manual validation later.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-lint:
    name: cargo fmt + clippy (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neurogrim

      # Style gate — baseline landed via `cargo fmt --all` in a dedicated
      # commit. Further drift is caught here.
      - name: cargo fmt --check
        working-directory: neurogrim
        run: cargo fmt --all -- --check

      # Lint gate — NOT `-D warnings` yet. The workspace emits ~40 warnings
      # (mostly rmcp macro's unread `tool_router` field + a few `Default`-
      # impl suggestions) that we accept for now. Running clippy here at
      # least documents the current warning set and catches NEW issues in
      # PR diffs via the usual GitHub annotations. Tightening to
      # `-D warnings` is a follow-on once the baseline noise is cleaned.
      - name: cargo clippy
        working-directory: neurogrim
        run: cargo clippy --workspace --all-targets

  rust:
    name: cargo test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neurogrim

      # Primary gate — every unit + integration test across the workspace.
      # Includes sensor_behavior.rs (Tier-A), cli_smoke.rs, dual_brain_pair.rs,
      # schema_conformance.rs (skips silently without LSP-Brains sibling,
      # which is fine — CI here is NeuroGrim-only; ecosystem CI covers the
      # cross-repo schema check).
      - name: cargo test --workspace
        working-directory: neurogrim
        run: cargo test --workspace --all-targets

  frontend:
    name: dashboard frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neurogrim/crates/neurogrim-dashboard/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: neurogrim/crates/neurogrim-dashboard/frontend/package-lock.json

      # Locked install. The `dependency-discipline` skill (bundled in
      # init-skills/) plus xtask sca-check are the policy layer; CI
      # enforces the technical lock.
      - name: npm ci
        run: npm ci

      # Vitest gate — every component test, every hook test, the
      # router-helper smoke. Phase 1-2 currently sits at ~104 tests
      # across 14 files.
      - name: vitest
        run: npx vitest run

      # Build gate — produces `dist/` artifacts that the Rust crate
      # embeds at compile time via rust-embed.
      - name: build
        run: npm run build

      # Drift gate — `dist/` is committed and ships in the published
      # cargo tarball. A contributor who edits src/ without rebuilding
      # would silently ship stale assets to crates.io. Fail loudly if
      # the rebuilt dist/ differs from what's in git.
      #
      # Vite's content-hashed filenames are deterministic given
      # identical inputs (npm ci provides that), so a clean build
      # against the same source should byte-match the committed
      # output.
      - name: dist freshness check
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::neurogrim-dashboard frontend dist/ is stale relative to source."
            echo "Run 'npm run build' in neurogrim/crates/neurogrim-dashboard/frontend/"
            echo "and commit the regenerated dist/ files."
            exit 1
          fi

  bindings-drift:
    name: ts-rs bindings drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: neurogrim

      # ts-rs generates TypeScript types from #[derive(TS)] structs at
      # `cargo test` time. The generated `.ts` files in
      # `crates/neurogrim-dashboard/bindings/` are committed to git
      # and consumed by the frontend's tsc typechecking. If a
      # contributor adds/changes a #[derive(TS)] struct without
      # regenerating, the frontend build still works (it doesn't see
      # the new field) — but the wire format silently drifts.
      #
      # This gate is the canonical drift-catcher: regenerate the
      # bindings, fail if they differ from what's committed.
      - name: regenerate ts-rs bindings
        working-directory: neurogrim
        run: cargo test --quiet -p neurogrim-dashboard --lib export_bindings_marker

      - name: fail if bindings drifted
        run: |
          if ! git diff --exit-code neurogrim/crates/neurogrim-dashboard/bindings/; then
            echo "::error::ts-rs bindings drifted from what's committed."
            echo "Run 'cargo test -p neurogrim-dashboard --lib export_bindings_marker'"
            echo "locally and commit the regenerated bindings/*.ts files."
            exit 1
          fi

  python-sdk:
    name: python SDK pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install SDK + test deps
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: pytest
        working-directory: sdk-python
        # The SDK's schema-conformance test loads the canonical schema from
        # a sibling LSP-Brains path when available; here it skips gracefully
        # (CI here is NeuroGrim-only). Ecosystem CI exercises the cross-repo
        # path end-to-end.
        run: pytest tests/ -v

  compose-smoke:
    name: docker compose smoke
    runs-on: ubuntu-latest
    # Only run on pushes to main (not every PR) — the compose build +
    # container startup takes ~3-4 min. On PRs, the cargo test job
    # already covers the dual_brain_pair in-process equivalent.
    # Switch to `always` if a regression sneaks in via compose-only.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Docker Buildx is pre-installed on ubuntu-latest runners; enable
      # the builder so compose builds use it + benefit from layer caching.
      - uses: docker/setup-buildx-action@v3

      - name: docker compose smoke test
        run: ./scripts/verify-compose.sh
