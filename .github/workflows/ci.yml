name: CI

# Spec §3.8 "Testing Discipline" — every push and PR runs the full suite
# so drift surfaces at commit time rather than at manual validation later.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-lint:
    name: cargo fmt + clippy (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: motherbrain

      # Style gate — baseline landed via `cargo fmt --all` in a dedicated
      # commit. Further drift is caught here.
      - name: cargo fmt --check
        working-directory: motherbrain
        run: cargo fmt --all -- --check

      # Lint gate — NOT `-D warnings` yet. The workspace emits ~40 warnings
      # (mostly rmcp macro's unread `tool_router` field + a few `Default`-
      # impl suggestions) that we accept for now. Running clippy here at
      # least documents the current warning set and catches NEW issues in
      # PR diffs via the usual GitHub annotations. Tightening to
      # `-D warnings` is a follow-on once the baseline noise is cleaned.
      - name: cargo clippy
        working-directory: motherbrain
        run: cargo clippy --workspace --all-targets

  rust:
    name: cargo test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: motherbrain

      # Primary gate — every unit + integration test across the workspace.
      # Includes sensor_behavior.rs (Tier-A), cli_smoke.rs, dual_brain_pair.rs,
      # schema_conformance.rs (skips silently without LSP-Brains sibling,
      # which is fine — CI here is MotherBrain-only; ecosystem CI covers the
      # cross-repo schema check).
      - name: cargo test --workspace
        working-directory: motherbrain
        run: cargo test --workspace --all-targets

  python-sdk:
    name: python SDK pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install SDK + test deps
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: pytest
        working-directory: sdk-python
        # The SDK's schema-conformance test loads the canonical schema from
        # a sibling LSP-Brains path when available; here it skips gracefully
        # (CI here is MotherBrain-only). Ecosystem CI exercises the cross-repo
        # path end-to-end.
        run: pytest tests/ -v

  compose-smoke:
    name: docker compose smoke
    runs-on: ubuntu-latest
    # Only run on pushes to main (not every PR) — the compose build +
    # container startup takes ~3-4 min. On PRs, the cargo test job
    # already covers the dual_brain_pair in-process equivalent.
    # Switch to `always` if a regression sneaks in via compose-only.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Docker Buildx is pre-installed on ubuntu-latest runners; enable
      # the builder so compose builds use it + benefit from layer caching.
      - uses: docker/setup-buildx-action@v3

      - name: docker compose smoke test
        run: ./scripts/verify-compose.sh
