# Abstract / conceptual project template (e.g., job-hunt, knowledge-work
# project, methodology dogfooding). For projects whose primary surface is
# NOT code — though they may have ancillary scripts or tooling.
#
# Mirrors the v3.1 B'1 Pilot #1 (job-hunt) structure: 5 abstract domains
# paired with 3 generic, all advisory weight 0.0 with stub CMDBs at score
# 50 (honest "unknown" per spec principle #2). Sensors are deferred —
# what matters at adoption time is the structural framework + project-
# specific skill scaffolds.

[meta]
template_name = "abstract-project"
schema_version = "1"
description = "Abstract / conceptual project (no primary code; sensors deferred)"

[domains]
# Default domain set. Operators MAY override via --domains flag.
# All ship advisory weight 0.0 with stub CMDBs at score 50.
default = [
    "human-comms",
    "secret-refs",
    "git-health",
]

# Suggested abstract domains operators commonly add via --domains.
# Documented here as guidance; not auto-included.
abstract_examples = [
    "<your-domain-1>",
    "<your-domain-2>",
]

[skills]
# 7 general-purpose skills bundled with neurogrim that are useful for any
# project (abstract or otherwise). v3.2 added `neurogrim-onboarding` —
# the four-command orientation router for agents on first entry.
copy = [
    "hats",
    "imagination-mode",
    "north-star",
    "rubber-duck",
    "human-comms",
    "write-skill",
    "neurogrim-onboarding",
]

[safety_invariants]
# Conservative defaults for abstract projects: agent NEVER takes
# irreversible identity-bearing action without explicit operator approval.
# Templates may add project-specific invariants (e.g., job-hunt added
# auto-submit-application + auto-send-outreach blocks).
defaults = [
    { rule = "agents-must-not-perform-irreversible-actions-without-approval", minimum_level = "approve", description = "Generic safety rail for abstract projects: any non-reversible operator-identity-bearing action (submission, outreach, public commit, external comms) requires explicit operator approval. Templates may add project-specific invariants." },
]

[scoring]
# Default scoring config for advisory-only registries.
model = "multiplier"
floor_confidence_threshold = 30
floor_score_ceiling = 30

[confidence_thresholds]
cmdb_fresh_days = 1.0
cmdb_stale_days = 7.0
cmdb_very_stale_days = 30.0
