[package]
name = "neurogrim-sensory"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true
description = "Built-in sensory tool implementations for NeuroGrim"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
tracing = { workspace = true }
neurogrim-core = { workspace = true }

# Supply-chain SCA (E-SC-2): native lockfile parsing + OSV.dev HTTPS
# client + RustSec advisory-db TOML parsing. No external scanner
# binaries (per the 2026-04-24 locked decision — Trivy was the
# LiteLLM attack vector; we do not shell out to scanners).
cargo-lock = { workspace = true }
toml = { workspace = true }
semver = { workspace = true }
yarn-lock-parser = { workspace = true }
# reqwest is crate-locally pinned here to match `neurogrim-a2a`'s
# TLS posture (rustls-tls-native-roots — reads the OS trust store,
# supports enterprise / private CAs, avoids OpenSSL in Docker images).
# Keep in lock-step with `crates/neurogrim-a2a/Cargo.toml`.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-native-roots"] }
sha2 = "0.10"

[dev-dependencies]
# §3.8 Testing Discipline — validate CMDB envelope output against the
# canonical cmdb-envelope-v1 JSON Schema at integration-test time.
# Full JSON Schema (draft-07) validator; same contract the Python SDK
# test enforces.
jsonschema = "0.17"
# Tier-A sensor behavioral fixtures — each analyze_* runs against a
# programmatically populated TempDir; tempfile handles cleanup.
tempfile = "3"
tokio = { workspace = true }
# Axis 4 v1 (2026-04-22) — dead-skill tests need to backdate file
# mtimes to simulate old skills. std::fs doesn't offer write access
# to mtime on stable Rust.
filetime = "0.2"
