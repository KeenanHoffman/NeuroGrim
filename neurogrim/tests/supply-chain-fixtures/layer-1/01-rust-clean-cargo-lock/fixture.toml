# v1 note: advisory matching depends on live OSV.dev (or cached
# responses). When OSV returns advisories on these packages, this
# fixture's expected score drops accordingly. Calibration is a
# regression check, not an absolute claim — at minimum, the sensor
# must PARSE the lockfile and produce a CMDB.
#
# We deliberately do NOT assert sensor_status or specific advisory
# IDs because:
# - OSV may surface new advisories on serde/proc-macro2/etc. over
#   time (then the fixture's known-good label becomes operator-
#   needs-to-triage territory and the fixture should be refreshed).
