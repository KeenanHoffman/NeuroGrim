# Secret References Manifest
#
# Catalogs every secret this project uses — where it lives, what it is for,
# and how to access it. SAFE TO COMMIT: no values are stored here.
# Actual values live in the secret manager referenced by each entry.
#
# Agents read .claude/secret-refs-cmdb.json (generated from this file) to
# produce safe secret-access code without ever seeing credential values.
#
# Regenerate CMDB after editing:
#   motherbrain sensory secret-refs --project-root . > .claude/secret-refs-cmdb.json
#
# Full schema reference: .claude/skills/secret-refs.md

# Default provider used when an entry omits the `provider` field.
default_provider: env

# ── Custom provider definitions (optional) ───────────────────────────────────
# Built-in providers: gcp, aws, azure, vault, env
# Define custom providers here, or register them via the Python SDK:
#   from lsp_brains import SecretProvider, SecretProviderSpec
#   class MyProvider(SecretProvider):
#       spec = SecretProviderSpec(name="my-vault", ...)
#   MyProvider.register(project_root=".")
#
# providers:
#   my-vault:
#     description: "Internal HashiCorp Vault instance"
#     reference_template: |
#       import hvac, os
#       client = hvac.Client(url="{vault_url}", token=os.environ["VAULT_TOKEN"])
#       {env_var} = client.secrets.kv.v2.read_secret_version(
#           path="{secret_path}")["data"]["data"]["value"]
#     access_pattern: "{mount}/{path}"

# ── Secret entries ────────────────────────────────────────────────────────────

secrets:
  github-pat:
    description: "GitHub Personal Access Token — used by the GitHub MCP sensory server to read repo metadata"
    env_var: GITHUB_PERSONAL_ACCESS_TOKEN
    provider: env
    secret_path: GITHUB_PERSONAL_ACCESS_TOKEN
    used_by:
      - github-mcp-server
    rotation_days: 90
    tags:
      - github
      - mcp
      - sensory
